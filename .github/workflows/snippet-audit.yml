name: Snippet Detection Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  jf-audit-snippet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.107.0
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Verify JFrog CLI version
        run: jf --version

      - name: Run snippet audit
        env:
          JF_SNIPPET_WATCHES: ${{ vars.JF_SNIPPET_WATCHES || 'minimum-to-respect' }}
          JF_PROJECT: ${{ vars.JF_PROJECT }}
          JFROG_CLI_LOG_LEVEL: DEBUG
        run: bash scripts/run-snippet-audit.sh
